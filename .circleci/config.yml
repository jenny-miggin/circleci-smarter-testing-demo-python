version: 2.1

# Demo for CircleCI Smarter Testing with pytest: discovery, splitting, impact analysis, auto-rerun.
# See https://circleci.com/docs/guides/test/getting-started-with-smarter-testing/
#
# Active workflow: "smarter-testing-demo" (uses circleci run testsuite + test-suites.yml)
# Fallback workflow: "test-pytest-only" — enable by uncommenting below and commenting out
# smarter-testing-demo if the testsuite plugin is unavailable.

# ---------------------------------------------------------------------------
# Reusable executor
# ---------------------------------------------------------------------------
executors:
  python:
    docker:
      - image: cimg/python:3.12
    resource_class: small

# ---------------------------------------------------------------------------
# Reusable commands
# ---------------------------------------------------------------------------
commands:
  install-deps:
    description: Restore pip cache, create venv, install dependencies, save cache
    steps:
      - restore_cache:
          keys:
            # Prefer an exact match on both dependency files; fall back to either alone.
            - v2-deps-{{ checksum "requirements.txt" }}-{{ checksum "pyproject.toml" }}
            - v2-deps-{{ checksum "requirements.txt" }}-
            - v2-deps-

      - run:
          name: Install dependencies
          command: |
            python -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install -e .

      - save_cache:
          key: v2-deps-{{ checksum "requirements.txt" }}-{{ checksum "pyproject.toml" }}
          paths:
            - venv
            - ~/.cache/pip

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # Primary job: CircleCI Smarter Testing (test impact analysis + auto-rerun)
  test:
    executor: python
    parallelism: 4
    steps:
      - checkout
      - install-deps

      - run:
          name: Run tests (Smarter Testing)
          command: |
            . venv/bin/activate
            circleci run testsuite "ci tests"

      - store_test_results:
          path: test-reports

      - store_artifacts:
          path: test-reports
          destination: test-results

  # Fallback job: plain pytest with CircleCI's built-in test splitting (no plugin required)
  test-pytest:
    executor: python
    parallelism: 4
    steps:
      - checkout
      - install-deps

      - run:
          name: Run tests (pytest with timing-based test splitting)
          command: |
            . venv/bin/activate
            mkdir -p test-reports
            # Use CircleCI's built-in test splitting by timing data for optimal distribution.
            # Falls back to splitting by name when no timing data is available yet.
            TEST_FILES=$(circleci tests glob "tests/test*.py" \
              | circleci tests split --split-by=timings --timings-type=filename)
            if [ -n "$TEST_FILES" ]; then
              pytest --disable-pytest-warnings --no-header --quiet --tb=short \
                --junit-xml="test-reports/tests-${CIRCLE_NODE_INDEX:-0}.xml" \
                $TEST_FILES
            else
              echo '<?xml version="1.0"?><testsuites></testsuites>' \
                > "test-reports/tests-${CIRCLE_NODE_INDEX:-0}.xml"
            fi

      - store_test_results:
          path: test-reports

      - store_artifacts:
          path: test-reports
          destination: test-results

# ---------------------------------------------------------------------------
# Workflows
# ---------------------------------------------------------------------------
workflows:
  smarter-testing-demo:
    jobs:
      - test

  # Uncomment to use plain pytest splitting instead (no Smarter Testing plugin needed):
  # test-pytest-only:
  #   jobs:
  #     - test-pytest
